<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subway Surfers</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #222;
            font-family: Arial, sans-serif;
        }

        canvas {
            border: 2px solid white;
            background: linear-gradient(180deg, #87CEEB 0%, #E0F6FF 100%);
            display: block;
        }

        #score {
            position: fixed;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 24px;
            background: rgba(0,0,0,0.7);
            padding: 10px 20px;
            border-radius: 5px;
        }

        #gameOver {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.95);
            color: white;
            padding: 40px;
            border-radius: 10px;
            text-align: center;
            display: none;
            z-index: 1000;
        }

        #gameOver h1 {
            font-size: 48px;
            margin-bottom: 20px;
        }

        #gameOver p {
            font-size: 24px;
            margin-bottom: 30px;
        }

        #gameOver button {
            padding: 15px 40px;
            font-size: 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        #gameOver button:hover {
            background: #764ba2;
        }
    </style>
</head>
<body>
    <div id="score">Score: 0</div>
    <canvas id="gameCanvas" width="400" height="600"></canvas>
    <div id="gameOver">
        <h1>GAME OVER!</h1>
        <p id="finalScore">Score: 0</p>
        <button onclick="location.reload()">Restart</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('score');
        const gameOverScreen = document.getElementById('gameOver');

        // Game variables
        let score = 0;
        let gameActive = true;
        let keys = {};

        // Player
        const player = {
            x: 175,
            y: 520,
            width: 50,
            height: 50,
            speed: 10,
            lane: 1 // 0 = left, 1 = middle, 2 = right
        };

        // Obstacles
        let obstacles = [];
        let obstacleSpeed = 5;
        let spawnRate = 0.02;

        // Coins
        let coins = [];
        let coinSpeed = 5;

        // Event listeners
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft' || e.key === 'a') {
                if (player.lane > 0) player.lane--;
            }
            if (e.key === 'ArrowRight' || e.key === 'd') {
                if (player.lane < 2) player.lane++;
            }
        });

        // Update player position based on lane
        function updatePlayerPosition() {
            if (player.lane === 0) player.x = 50;
            if (player.lane === 1) player.x = 175;
            if (player.lane === 2) player.x = 300;
        }

        // Spawn obstacles
        function spawnObstacle() {
            if (Math.random() < spawnRate) {
                const lane = Math.floor(Math.random() * 3);
                const x = lane === 0 ? 50 : lane === 1 ? 175 : 300;
                obstacles.push({
                    x: x,
                    y: -50,
                    width: 50,
                    height: 50
                });
            }
        }

        // Spawn coins
        function spawnCoin() {
            if (Math.random() < 0.01) {
                const lane = Math.floor(Math.random() * 3);
                const x = lane === 0 ? 50 : lane === 1 ? 175 : 300;
                coins.push({
                    x: x,
                    y: -20,
                    width: 20,
                    height: 20
                });
            }
        }

        // Check collision
        function checkCollision(rect1, rect2) {
            return rect1.x < rect2.x + rect2.width &&
                   rect1.x + rect1.width > rect2.x &&
                   rect1.y < rect2.y + rect2.height &&
                   rect1.y + rect1.height > rect2.y;
        }

        // Draw player
        function drawPlayer() {
            ctx.fillStyle = '#FF6B6B';
            ctx.fillRect(player.x - 25, player.y, player.width, player.height);
            ctx.fillStyle = 'white';
            ctx.fillRect(player.x - 20, player.y + 10, 10, 10);
            ctx.fillRect(player.x + 10, player.y + 10, 10, 10);
        }

        // Draw obstacles
        function drawObstacles() {
            ctx.fillStyle = '#CC0000';
            obstacles.forEach(obs => {
                ctx.fillRect(obs.x - 25, obs.y, obs.width, obs.height);
            });
        }

        // Draw coins
        function drawCoins() {
            ctx.fillStyle = '#FFD700';
            coins.forEach(coin => {
                ctx.beginPath();
                ctx.arc(coin.x, coin.y + 10, 10, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        // Update game
        function update() {
            if (!gameActive) return;

            updatePlayerPosition();
            spawnObstacle();
            spawnCoin();

            // Move obstacles
            obstacles = obstacles.filter(obs => obs.y < canvas.height);
            obstacles.forEach(obs => {
                obs.y += obstacleSpeed;
                if (checkCollision(player, obs)) {
                    gameActive = false;
                    gameOverScreen.style.display = 'block';
                    document.getElementById('finalScore').textContent = `Final Score: ${score}`;
                }
            });

            // Move coins
            coins = coins.filter(coin => coin.y < canvas.height);
            coins.forEach((coin, index) => {
                coin.y += coinSpeed;
                if (checkCollision(player, coin)) {
                    score += 10;
                    scoreDisplay.textContent = `Score: ${score}`;
                    coins.splice(index, 1);
                }
            });

            // Increase difficulty
            if (score > 0 && score % 100 === 0) {
                obstacleSpeed += 0.5;
            }
        }

        // Draw game
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawPlayer();
            drawObstacles();
            drawCoins();
        }

        // Game loop
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
